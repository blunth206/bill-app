<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码重置</title>
<style>
body{font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#f5f5f5}
.card{background:#fff;border-radius:16px;padding:32px 24px;max-width:380px;width:90%;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.1)}
h2{margin:0 0 8px;color:#333}
p{color:#666;font-size:14px;margin:0 0 20px;line-height:1.6}
.btn{display:inline-block;padding:14px 36px;background:#4A90D9;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
.btn:active{background:#3a7bc8}
#msg{margin-top:16px;font-size:14px;color:#888}
.ok{color:#4caf50!important}
.err{color:#e53935!important}
</style>
</head>
<body>
<div class="card">
<h2>密码重置</h2>
<p>点击下方按钮将所有账号密码重置为 <b>123456</b><br>不会删除账单数据</p>
<button class="btn" onclick="resetPwd()">重置所有密码</button>
<div id="msg"></div>
</div>
<script>
function resetPwd(){
var m=document.getElementById('msg');
m.innerText='处理中...';
m.className='';
var r=indexedDB.open('BillAppDB');
r.onerror=function(){m.className='err';m.innerText='无法打开数据库，请确认当前是 bill-app 域名';};
r.onsuccess=function(e){
var db=e.target.result;
var tx=db.transaction(['store'],'readwrite');
var store=tx.objectStore('store');
var getReq=store.get('billApp_data');
getReq.onsuccess=function(ev){
var data=ev.target.result;
if(!data||!data.accounts){m.className='err';m.innerText='未找到账号数据';return;}
data.accounts.forEach(function(a){a.password='123456';});
store.put(data,'billApp_data');
store.delete('billApp_savedCred');
tx.oncomplete=function(){m.className='ok';m.innerText='密码已重置为 123456！请返回登录页面刷新后用 管理员/123456 登录';};
};
getReq.onerror=function(){m.className='err';m.innerText='读取数据失败';};
};
}
</script>
</body>
</html>
